# lefthook.yml — git hook manager for claude-plugins
#
# Install with ./scripts/install-lefthook.sh or `npm install` (the `prepare`
# script triggers `lefthook install`). See docs/lefthook-usage.md for details.
#
# Bypass a hook once:   git commit --no-verify / git push --no-verify
# Skip in CI:           lefthook checks CI=true automatically; no config needed.

pre-commit:
  parallel: true
  commands:
    lint:
      run: ./scripts/lint.sh --staged --fix --python --shell
      stage_fixed: true
    format:
      run: ./scripts/format.sh --staged --python --docs
      stage_fixed: true

pre-push:
  commands:
    validate:
      run: ./scripts/validate.sh

commit-msg:
  commands:
    commitlint:
      run: npx --no -- commitlint --edit {1}
