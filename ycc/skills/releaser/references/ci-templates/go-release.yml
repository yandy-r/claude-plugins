# Generated by ycc:releaser — edit TODO regions before first run.
#
# Trigger: push a tag matching v*.  Uses goreleaser for the build matrix + GitHub
# Release.  Requires `.goreleaser.yml` (or `.goreleaser.yaml`) at repo root — seed
# one via `goreleaser init` if missing.

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # for creating the release and uploading assets
      packages: write # for pushing container images if .goreleaser.yml defines `dockers:`
      id-token: write # for cosign keyless signing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # goreleaser needs full history for changelog generation

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3.8.1 — TODO(releaser): verify latest SHA

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@9c156ee8a17a598857849441385a2041ef570552 # v6.3.0 — TODO(releaser): verify latest SHA
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # TODO(releaser): if publishing a Homebrew tap, add HOMEBREW_TAP_GITHUB_TOKEN.
