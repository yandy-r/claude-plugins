name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # TODO(releaser): add your toolchain setup here (e.g. actions/setup-<lang>).

      # TODO(releaser): add your build + packaging steps.  Place artifacts in dist/.
      - name: Build
        run: |
          mkdir -p dist
          echo "TODO: replace with real build command" > dist/README-placeholder.txt

      - name: Checksum
        run: |
          cd dist
          find . -maxdepth 1 -type f -not -name 'SHA256SUMS*' -print0 \
            | xargs -0 sha256sum > SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  github-release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2 — TODO(releaser): verify latest SHA
        with:
          files: dist/*
          body_path: docs/releases/${{ github.ref_name }}.md # TODO(releaser): adjust path if needed
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
