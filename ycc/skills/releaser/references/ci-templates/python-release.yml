# Generated by ycc:releaser — edit TODO regions before first run.
#
# Trigger: push a tag matching v*.  Builds sdist + wheels and publishes to PyPI via
# Trusted Publishing (OIDC).  To use Trusted Publishing, configure the project on
# https://pypi.org/manage/account/publishing/ — no API token required.

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build sdist + wheels
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist + wheel
        run: python -m build
        # TODO(releaser): for packages with compiled extensions, replace this with
        # cibuildwheel — see https://cibuildwheel.pypa.io/en/stable/.

      - name: Checksum
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish-pypi:
    name: publish (PyPI)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write # Required for Trusted Publishing
    environment:
      name: pypi
      url: https://pypi.org/p/${{ github.event.repository.name }} # TODO(releaser): set to the real package name if it differs
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4 — TODO(releaser): verify latest SHA
        with:
          skip-existing: false

  github-release:
    name: github release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2 — TODO(releaser): verify latest SHA
        with:
          files: dist/*
          body_path: docs/releases/${{ github.ref_name }}.md # TODO(releaser): adjust path if needed
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
