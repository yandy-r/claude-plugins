# Generated by ycc:releaser — edit TODO regions before first run.
#
# Trigger: push a tag matching v*.  Builds per-platform binaries and optionally
# publishes to crates.io.  If the repo already uses cargo-dist, delete this file and
# keep the cargo-dist-generated workflow instead.

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # TODO(releaser): trim to the {os x arch} combos declared in the skill.
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable — TODO(releaser): verify latest SHA
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.8.0 — TODO(releaser): verify latest SHA
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          name="${{ github.event.repository.name }}"
          tag="${{ github.ref_name }}"
          target="${{ matrix.target }}"
          staging="${name}-${tag}-${target}"
          mkdir -p "${staging}"
          if [[ "${target}" == *windows* ]]; then
            cp "target/${target}/release/${name}.exe" "${staging}/"
            7z a "${staging}.zip" "${staging}"
          else
            cp "target/${target}/release/${name}" "${staging}/"
            tar -czf "${staging}.tar.gz" "${staging}"
          fi

      - name: Checksum
        shell: bash
        run: |
          for f in ${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}.*; do
            sha256sum "$f" > "${f}.sha256"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}.*
          if-no-files-found: error
          retention-days: 7

  publish-crates-io:
    name: publish (crates.io)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # TODO(releaser): remove this job if the project is not a library publish.
    permissions:
      contents: read
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: github release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2 — TODO(releaser): verify latest SHA
        with:
          files: artifacts/*
          body_path: docs/releases/${{ github.ref_name }}.md # TODO(releaser): adjust path if needed
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
