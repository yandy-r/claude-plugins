# Test fixture — not for production use. No real customer data.
# Used by: yci/skills/customer-profile/tests/test_compliance_adapter_resolution.sh
# Regime is deliberately `commercial` to exercise the full-adapter path.

customer:
  id: widgetco-example
  display_name: WidgetCo Example Industries
  code: WCE
  branding:
    color: '#2E7D32'
    logo_path: '~/customers/widgetco-example/logo.png'

engagement:
  id: eng-widgetco-example-2026-q2
  type: implementation
  sow_ref: SOW-WCE-2026-002
  scope_tags:
    - gateway-hardening
    - observability
  start_date: '2026-04-01'
  end_date: '2026-09-30'

compliance:
  regime: commercial
  evidence_schema_version: 1

change_window:
  adapter: json-schedule
  source: '~/.config/yci/change-windows/widgetco-example.json'
  timezone: America/Los_Angeles

inventory:
  adapter: netbox
  endpoint: https://netbox.widgetco.example.test
  credential_ref: vault://ops/widgetco-example/netbox
  path: /api/dcim/devices

approval:
  adapter: github-pr
  endpoint: https://github.example.test/widgetco-example/ops
  credential_ref: vault://ops/widgetco-example/github

vaults:
  path: op://WidgetCo-Example-Ops/main

deliverable:
  format:
    - markdown
  header_template: 'Deliverable for WidgetCo Example Industries — {engagement.id}'
  handoff_format: git-repo
  path: /mnt/deliverables/widgetco-example

vendor_tooling:
  - vendor: hashicorp
    product: terraform
    version: '1.7'
  - vendor: grafana
    product: alloy
    version: '1.2'

safety:
  default_posture: review
  change_window_required: true
  scope_enforcement: warn
