change_id: WIDGET-MOP-STRUCT-001
summary: Enable OSPF area 0 on dc1-edge-01 uplink toward dc1-spine-01.
targets:
  - kind: device
    id: dc1-edge-01

forward:
  - device: dc1-edge-01
    cli: |
      router ospf 1
        network 10.100.1.0 0.0.0.255 area 0
      !

reverse:
  - device: dc1-edge-01
    cli: |
      router ospf 1
        no network 10.100.1.0 0.0.0.255 area 0
      !
