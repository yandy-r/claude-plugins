# Generated by releaser — edit TODO regions before first run.
#
# Trigger: push a tag matching v*.  Publishes to npm and attaches artifacts to the
# GitHub Release.  Requires the NPM_TOKEN secret (or switch to npm Trusted Publishing
# via OIDC — see the commented-out block below).

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # TODO(releaser): trim the matrix to the {os x arch} combos declared in
          # the skill invocation.  Remove rows you do not intend to ship.
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: darwin
            arch: amd64
            runner: macos-13
          - os: darwin
            arch: arm64
            runner: macos-14
          - os: windows
            arch: amd64
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc' # TODO(releaser): or replace with `node-version: '20'`
          cache: 'npm' # TODO(releaser): switch to 'pnpm' or 'yarn' as appropriate

      - run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Package
        # TODO(releaser): replace with your actual packaging step.  For a CLI:
        #   npx pkg . --targets node20-${{ matrix.os }}-${{ matrix.arch }} --output dist/${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}
        run: npm pack

      - name: Checksum
        shell: bash
        run: |
          cd dist || cd .
          find . -maxdepth 1 -type f \( -name '*.tgz' -o -name "${{ github.event.repository.name }}-*" \) -print0 \
            | xargs -0 sha256sum > SHA256SUMS-${{ matrix.os }}-${{ matrix.arch }}.txt

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/*
            SHA256SUMS-*.txt
          if-no-files-found: error
          retention-days: 7

  publish-npm:
    name: publish (npm)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write # Required for npm Trusted Publishing (OIDC)
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build --if-present
      # Option A — API token (legacy):
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      # Option B — Trusted Publishing (preferred, no token):
      # - run: npm publish --provenance --access public

  github-release:
    name: github release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # needed to upload release assets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2 — TODO(releaser): verify latest SHA
        with:
          files: artifacts/*
          body_path: docs/releases/${{ github.ref_name }}.md # TODO(releaser): adjust if notes live elsewhere
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
